<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aruba Restaurant &amp; Bar</title>
    <style>
      :root {
        --aruba-blue: #1600ff;
        --page-max: 820px;
        --page-padding: clamp(12px, 2.5vw, 28px);
        --section-gap: clamp(20px, 3vw, 36px);
        --topbar-icon-size: clamp(28px, 5vw, 44px);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #ffffff;
      }

      main {
        width: min(100%, var(--page-max));
        margin: 0 auto;
        padding: var(--page-padding);
      }

      img {
        display: block;
        width: 100%;
        max-width: 100%;
        height: auto;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .section {
        margin-top: var(--section-gap);
      }

      .hero-topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: clamp(8px, 1.4vw, 16px);
      }

      .hero-topbar a {
        width: var(--topbar-icon-size);
        height: var(--topbar-icon-size);
      }

      .hero-topbar a img {
        width: 100%;
        height: 100%;
      }

      .corner-fountain {
        display: block;
        width: calc(var(--topbar-icon-size) * 0.75);
        height: var(--topbar-icon-size);
        object-fit: cover;
        object-position: top center;
      }

      .hero-card {
        border: clamp(6px, 0.8vw, 10px) solid var(--aruba-blue);
        border-radius: clamp(28px, 4vw, 48px);
        padding: clamp(14px, 2.6vw, 32px) clamp(14px, 2.6vw, 32px) clamp(18px, 3vw, 36px);
      }

      .hero-address {
        max-width: min(70%, 520px);
        margin: 0 auto clamp(16px, 2.8vw, 30px);
      }

      .hero-brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: clamp(10px, 2vw, 24px);
        min-width: 0;
      }

      .hero-fountain {
        width: clamp(40px, 11vw, 104px);
        flex: 0 0 clamp(40px, 11vw, 104px);
        min-width: 0;
      }

      .hero-logo {
        width: clamp(210px, 52vw, 430px);
        flex: 1 1 clamp(210px, 52vw, 430px);
        min-width: 0;
        max-width: 100%;
      }

      .hero-info {
        margin-top: var(--section-gap);
      }

      .menu-frame {
        margin: 0;
      }

      .section-title {
        margin: 0 auto clamp(12px, 2vw, 24px);
      }

      .gift-title {
        max-width: 72%;
      }

      .gift-shop {
        margin-top: clamp(-42px, -5vw, -20px);
        padding-top: clamp(18px, 3vw, 32px);
        position: relative;
      }

      .gift-shop::before {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: clamp(112px, 18vw, 156px);
        background: #ffffff;
        border-top-left-radius: clamp(34px, 8vw, 64px);
        border-top-right-radius: clamp(34px, 8vw, 64px);
      }

      .gift-shop img {
        position: relative;
      }

      .gift-shop .gift-title {
        margin-bottom: clamp(18px, 3vw, 32px);
      }

      .instagram-shell {
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="hero-topbar">
          <img
            class="corner-fountain"
            src="assets/Fountain.png"
            alt=""
          >
          <a
            href="https://www.instagram.com/aruba_ct?utm_source=ig_web_button_share_sheet&amp;igsh=ZDNlZDc0MzIxNw=="
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit Aruba Restaurant and Bar on Instagram"
          >
            <img src="assets/Logo top right. png.png" alt="Instagram icon">
          </a>
        </div>

        <div class="hero-card">
          <img
            class="hero-address"
            src="assets/Centre text top.png"
            alt="108 Kloof Street, Cape Town"
          >

          <div class="hero-brand">
            <img
              class="hero-fountain"
              src="assets/Fountain.png"
              alt=""
            >
            <img
              class="hero-logo"
              src="assets/logo Top.png"
              alt="Aruba Restaurant and Bar"
            >
            <img
              class="hero-fountain"
              src="assets/Fountain.png"
              alt=""
            >
          </div>
        </div>

        <img
          class="hero-info section"
          src="assets/First Info.png"
          alt="Tuesday to Sunday, 12 PM to 12 AM, on street parking"
        >
      </header>

      <section class="section" aria-label="Menu">
        <div class="menu-frame">
          <img
            src="assets/generated/menu-section.jpg"
            alt="Aruba menu preview"
          >
        </div>
      </section>

      <section class="section gift-shop" aria-label="Gift shop">
        <img
          class="section-title gift-title"
          src="assets/Gift shop.png"
          alt="Aruba gift shop"
        >
        <img
          src="assets/ Gift SHop Image.jpg"
          alt="Aruba gift shop products"
        >
      </section>

      <a
        class="section instagram-shell"
        href="https://www.instagram.com/aruba_ct/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open Aruba Restaurant and Bar Instagram profile"
      >
        <img
          src="assets/generated/instagram-section.jpg"
          alt="Instagram food gallery and contact details"
        >
      </a>
    </main>
  </body>
</html>
