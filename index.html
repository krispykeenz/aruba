<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aruba Restaurant &amp; Bar</title>
    <style>
      :root {
        --aruba-blue: #1600ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #ffffff;
      }

      main {
        width: min(100%, 460px);
        margin: 0 auto;
        padding: 12px;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .section {
        margin-top: 20px;
      }

      .hero-topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .hero-topbar img,
      .hero-topbar a {
        width: 28px;
        height: 28px;
      }

      .corner-fountain {
        display: block;
        object-fit: contain;
      }

      .hero-card {
        border: 6px solid var(--aruba-blue);
        border-radius: 28px;
        padding: 14px 14px 18px;
      }

      .hero-address {
        max-width: 300px;
        margin: 0 auto 16px;
      }

      .hero-brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .hero-fountain {
        width: 54px;
        flex: 0 0 54px;
      }

      .hero-logo {
        flex: 1 1 auto;
        max-width: 230px;
      }

      .hero-info {
        margin-top: 20px;
      }

      .menu-frame {
        margin: 0;
      }

      .section-title {
        margin: 0 auto 12px;
      }

      .gift-title {
        max-width: 72%;
      }

      .instagram-shell {
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="hero-topbar">
          <img
            class="corner-fountain"
            src="assets/Fountain.png"
            alt=""
          >
          <a
            href="https://www.instagram.com/aruba_ct?utm_source=ig_web_button_share_sheet&amp;igsh=ZDNlZDc0MzIxNw=="
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit Aruba Restaurant and Bar on Instagram"
          >
            <img src="assets/Logo top right. png.png" alt="Instagram icon">
          </a>
        </div>

        <div class="hero-card">
          <img
            class="hero-address"
            src="assets/Centre text top.png"
            alt="108 Kloof Street, Cape Town"
          >

          <div class="hero-brand">
            <img
              class="hero-fountain"
              src="assets/Fountain.png"
              alt=""
            >
            <img
              class="hero-logo"
              src="assets/logo Top.png"
              alt="Aruba Restaurant and Bar"
            >
            <img
              class="hero-fountain"
              src="assets/Fountain.png"
              alt=""
            >
          </div>
        </div>

        <img
          class="hero-info section"
          src="assets/First Info.png"
          alt="Tuesday to Sunday, 12 PM to 12 AM, on street parking"
        >
      </header>

      <section class="section" aria-label="Menu">
        <div class="menu-frame">
          <img
            src="assets/generated/menu-section.jpg"
            alt="Aruba menu preview"
          >
        </div>
      </section>

      <section class="section" aria-label="Gift shop">
        <img
          class="section-title gift-title"
          src="assets/Gift shop.png"
          alt="Aruba gift shop"
        >
        <img
          src="assets/ Gift SHop Image.jpg"
          alt="Aruba gift shop products"
        >
      </section>

      <a
        class="section instagram-shell"
        href="https://www.instagram.com/aruba_ct?utm_source=ig_web_button_share_sheet&amp;igsh=ZDNlZDc0MzIxNw=="
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open Aruba Restaurant and Bar Instagram profile"
      >
        <img
          src="assets/generated/instagram-section.jpg"
          alt="Instagram food gallery and contact details"
        >
      </a>
    </main>
  </body>
</html>
